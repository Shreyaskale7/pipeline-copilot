# Continuous integration: run the test suite + eval harness on every push/PR.
# No API key is needed — every check here is deterministic (the risk logic, the
# grounding guardrail, and the eval scorecard run without calling an LLM).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -q

      - name: Run eval harness (risk ranking + groundedness)
        run: python evals/run_evals.py
